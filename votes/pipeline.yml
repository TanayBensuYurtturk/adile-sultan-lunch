name: adile-sultan-votes
# Ensures the bot-managed lunch.votes table exists. The bots (see bot*.md) do the row writes;
# this pipeline just owns the schema. CREATE TABLE IF NOT EXISTS is idempotent, so a daily run is safe.
schedule: daily
start_date: "2026-07-07"
catchup: false

default_connections:
    google_cloud_platform: gcp-default
